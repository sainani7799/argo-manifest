apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: argocd-gatex-dev

resources:
  - ../../../base/gatex-ui-service
  - config.yaml

# Image tag management for ArgoCD
images:
  - name: ghcr.io/sainani7799/argo-gatex/gatex-ui
    newTag: 1.5.0-dev

# Patches for environment configuration
patchesStrategicMerge:
  - |-
    apiVersion: apps/v1
    kind: Deployment
    metadata:
      name: gatex-ui-deployment
      namespace: argocd-gatex-dev
    spec:
      template:
        spec:
          containers:
            - name: gatex-ui
              envFrom:
                - configMapRef:
                    name: gatex-ui-service-config

commonLabels:
  app: argo-gatex-ui-service
  environment: dev
  managed-by: argocd
