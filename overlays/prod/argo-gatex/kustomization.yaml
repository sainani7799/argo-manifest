apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

bases:
  - ../../base/argo-gatex

replicas:
  - name: gatex-ui
    count: 2
  - name: gatex-be
    count: 2

images:
  - name: argo-gatex/gatex-ui
    newTag: v1.0.0
  - name: argo-gatex/gatex-be
    newTag: v1.0.0

commonLabels:
  environment: prod

patches:
  - target:
      kind: Deployment
      name: gatex-ui
    patch: |-
      - op: replace
        path: /spec/template/spec/containers/0/resources/requests/memory
        value: "512Mi"
      - op: replace
        path: /spec/template/spec/containers/0/resources/limits/memory
        value: "1Gi"
  - target:
      kind: Deployment
      name: gatex-be
    patch: |-
      - op: replace
        path: /spec/template/spec/containers/0/resources/requests/memory
        value: "1Gi"
      - op: replace
        path: /spec/template/spec/containers/0/resources/limits/memory
        value: "2Gi"
