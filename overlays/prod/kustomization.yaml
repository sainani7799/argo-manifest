apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

bases:
  - ../../base

replicas:
  - name: application-a
    count: 3

images:
  - name: application-a
    newTag: v1.0.0

commonLabels:
  environment: prod

patches:
  - target:
      kind: Deployment
      name: application-a
    patch: |-
      - op: replace
        path: /spec/template/spec/containers/0/resources/requests/memory
        value: "512Mi"
      - op: replace
        path: /spec/template/spec/containers/0/resources/limits/memory
        value: "1Gi"
