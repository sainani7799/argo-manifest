apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: argo-gatex-dev
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/YOUR-ORG/argo-manifest
    targetRevision: HEAD
    path: overlays/dev/argo-gatex
  destination:
    server: https://kubernetes.default.svc
    namespace: argosai
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
