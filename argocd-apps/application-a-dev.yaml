apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: application-a-dev
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/YOUR-ORG/argo-manifest
    targetRevision: HEAD
    path: overlays/dev
  destination:
    server: https://kubernetes.default.svc
    namespace: application-a
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
