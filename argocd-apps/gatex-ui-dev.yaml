apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: gatex-ui-dev
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/YOUR-ORG/argo-manifest
    targetRevision: HEAD
    path: overlays/dev/gatex-ui-service
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd-gatex-dev
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - PrunePropagationPolicy=foreground
      - PruneLast=true
