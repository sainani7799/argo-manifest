apiVersion: apps/v1
kind: Deployment
metadata:
  name: gatex-be-deployment
  namespace: gtx-dev
spec:
  replicas: 1
  selector:
    matchLabels:
      app: gatex-be
  template:
    metadata:
      labels:
        app: gatex-be
    spec:
      containers:
      - name: gatex-be
        image: ghcr.io/schemax-pte-ltd/gatex/gatex-be:1.9.0-dev
        ports:
        - containerPort: 8080
        resources:
          requests:
            memory: "256Mi"
            cpu: "200m"
          limits:
            memory: "512Mi"
            cpu: "1000m"
